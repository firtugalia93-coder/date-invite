<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свидание</title>
    <style>
        body {
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 340px;
            text-align: center;
            box-sizing: border-box;
        }

        .bunny-img {
            width: 100%;
            border-radius: 20px;
            display: block;
        }

        .title {
            font-size: 18px;
            color: #333;
            margin: 20px 0;
            font-weight: 600;
        }

        /* Стили для кнопок первой страницы */
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-yes {
            background-color: #ffb3c6;
            color: white;
        }

        .btn-yes:hover {
            background-color: #ff8fa3;
        }

        .btn-no {
            background-color: #e0e0e0;
            color: #666;
        }

        /* Форма выбора даты (Вторая страница) */
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #fff0f5;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 14px;
            color: #555;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #ffb3c6;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #ff8fa3;
        }

        /* Класс для скрытия элементов */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ПЕРВАЯ СТРАНИЦА: ВОПРОС -->
    <div id="page1" class="card">
        <div class="image-container">
            <!-- Замените link_to_your_image1.gif на вашу гифку/картинку вопроса -->
            <img src="https://tenor.com" alt="Зайчик" class="bunny-img">
        </div>
        <h2 class="title">Пойдешь со мной на свидание? 🧸</h2>
        <div class="btn-container">
            <button id="yesBtn" class="btn btn-yes">Да!</button>
            <button id="noBtn" class="btn btn-no">Нет</button>
        </div>
    </div>

    <!-- ВТОРАЯ СТРАНИЦА: ВЫБОР ДАТЫ (Изначально скрыта) -->
    <div id="page2" class="card hidden">
        <div class="image-container">
            <!-- Замените link_to_your_image2.png на картинку с двумя зайчиками -->
            <img src="https://tenor.com" alt="Зайчики" class="bunny-img">
        </div>
        <h2 class="title">Итак... Когда ты свободна?</h2>
        <form class="date-form" onsubmit="sendData(event)">
            <div class="input-group">
                <label for="date-input">Дата</label>
                <input type="date" id="date-input" required>
            </div>
            <div class="input-group">
                <label for="time-input">Время</label>
                <input type="time" id="time-input" required>
            </div>
            <button type="submit" class="submit-btn">Выбери дату 🤍</button>
        </form>
    </div>

    <script>
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');

        // Переключение на вторую страницу при нажатии "Да"
        yesBtn.addEventListener('click', () => {
            page1.classList.add('hidden');
            page2.classList.remove('hidden');
        });

        // Убегающая или уменьшающаяся кнопка "Нет" (по желанию можно доработать)
        noBtn.addEventListener('click', () => {
            alert('Ой, эта кнопка сломалась, нажми "Да" 😊');
        });

        // Функция обработки отправки формы
        function sendData(event) {
            event.preventDefault();
            const date = document.getElementById('date-input').value;
            const time = document.getElementById('time-input').value;
            
            alert(`Ура! Дата выбрана: ${date} в ${time}`);
            // Здесь можно настроить отправку данных вам
        }
    </script>
</body>
</html>
