<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня есть к тебе вопрос... ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 90%;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        h1 {
            color: #d63031;
            font-size: 28px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .gif-container {
            font-size: 64px;
            margin-bottom: 25px;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            80%, 100% { transform: scale(1); }
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 80px;
            position: relative;
        }

        button {
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
            outline: none;
        }

        #btn-yes {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #btn-yes:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        #btn-no {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            left: 55%;
            z-index: 10;
        }

        /* Экран успешного ответа */
        .hidden {
            display: none !important;
        }

        .success-title {
            color: #27ae60;
        }
    </style>
</head>
<body>

    <!-- Главный экран -->
    <div class="container" id="main-card">
        <div class="gif-container">❤️</div>
        <h1>Пойдешь со мной на свидание?</h1>
        <div class="buttons">
            <button id="btn-yes">Да!</button>
            <button id="btn-no">Нет</button>
        </div>
    </div>

    <!-- Экран после нажатия "Да" -->
    <div class="container hidden" id="success-card">
        <div class="gif-container">🎉🥳 Indefinite</div>
        <h1 class="success-title">Ура! Я знал, что ты согласишься!</h1>
        <p style="color: #555; font-size: 18px; margin-top: 10px;">Пишу тебе в мессенджер, чтобы обсудить время и место! 😉</p>
    </div>

    <script>
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');
        const mainCard = document.getElementById('main-card');
        const successCard = document.getElementById('success-card');

        let yesScale = 1;

        // Функция перемещения кнопки "Нет"
        function moveButton() {
            // Получаем размеры контейнера кнопок, чтобы кнопка не улетала за экран
            const container = document.querySelector('.buttons');
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;

            // Вычисляем случайные координаты внутри этой области
            const randomX = Math.floor(Math.random() * (containerWidth - btnNo.clientWidth));
            const randomY = Math.floor(Math.random() * (containerHeight - btnNo.clientHeight)) - 20;

            // Меняем позиционирование кнопки
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';

            // При каждой попытке нажать "Нет" увеличиваем кнопку "Да"
            yesScale += 0.15;
            btnYes.style.transform = `scale(${yesScale})`;
        }

        // Обработчики для ПК (наведение мыши) и телефонов (касание)
        btnNo.addEventListener('mouseenter', moveButton);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Отменяет стандартный клик на телефонах
            moveButton();
        });

        // Логика кнопки "Да"
        btnYes.addEventListener('click', () => {
            mainCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });
    </script>
</body>
</html>
